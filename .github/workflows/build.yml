name: CI Build, Lint & Package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      CI: true
      DATABASE_URL: file:./test.db

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Push database schema
        run: pnpm run db:push

      - name: Build Next.js application
        run: pnpm run build

  package-windows:
    runs-on: windows-latest

    env:
      CI: true
      DATABASE_URL: file:./test.db
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Push database schema
        run: pnpm run db:push

      - name: Build Next.js standalone app
        run: pnpm run build

      - name: Prepare empty packaged database
        run: pnpm run db:prepare-packaged

      - name: Package Windows installer
        run: pnpm exec electron-builder --win nsis --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tech-fix-pro-windows-installer
          path: dist-electron/**
          if-no-files-found: error
